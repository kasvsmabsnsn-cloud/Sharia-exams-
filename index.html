    <style>
        /* ===== كل الأنماط (Styles) محفوظة كما هي ===== */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #050a14;
            color: white;
            margin: 0;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .moving-line {
            background: linear-gradient(90deg, #00d2ff, #ff8c00, #00d2ff);
            background-size: 200% auto;
            animation: gradientMove 3s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(255, 140, 0, 0.7), 0 0 40px rgba(255, 140, 0, 0.3);
        }

        .glow-title {
            filter: drop-shadow(0 0 15px rgba(255, 140, 0, 0.5));
        }

        .turbo-spin {
            animation: turbo-spin 0.5s linear infinite;
        }

        @keyframes turbo-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .turbo-spin-reverse {
            animation: turbo-spin-reverse 0.3s linear infinite;
        }

        @keyframes turbo-spin-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        .security-radar {
            position: absolute;
            z-index: 100;
            pointer-events: none;
            animation: floatAround 20s linear infinite;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(2px);
            white-space: nowrap;
        }

        @keyframes floatAround {
            0% { top: 10%; left: 10%; }
            50% { top: 80%; left: 70%; }
            100% { top: 10%; left: 10%; }
        }

        .fa-fingerprint {
            animation: pulse-blue 1.5s ease-in-out infinite;
        }

        @keyframes pulse-blue {
            0%, 100% { text-shadow: 0 0 5px #3b82f6, 0 0 10px #3b82f6; opacity: 0.5; }
            50% { text-shadow: 0 0 20px #3b82f6, 0 0 40px #3b82f6; opacity: 1; }
        }

        .exit-soft {
            opacity: 0 !important;
            filter: blur(20px) !important;
            transform: scale(1.2) !important;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out;
        }

        .animate-slideDown {
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            0% { transform: translateY(-100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* star animations */
        .star {
            animation: star-fly 2.5s infinite ease-out;
        }

        @keyframes star-fly {
            0% { transform: translate(0,0) scale(0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translate(var(--tx, 200px), var(--ty, 200px)) scale(1.2); opacity: 0; }
        }

        /* ===== أنيميشن السهم ===== */
        @keyframes float-down {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(6px); opacity: 1; }
        }

        /* ===== القائمة الجانبية ===== */
        #sidebarOverlay {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
        }

        #sidebarMenu {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* ===== إخفاء البطاقات عند التمرير ===== */
        .card-hidden {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-visible {
            opacity: 1;
            transform: translateY(0);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===== زر الرجوع الثابت ===== */
        .back-btn-fixed {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
            background: rgba(249, 115, 22, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(249, 115, 22, 0.3);
            color: #f97316;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cairo', sans-serif;
        }

        .back-btn-fixed:hover {
            background: rgba(249, 115, 22, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(249, 115, 22, 0.2);
        }

        /* تنسيق القائمة الجانبية */
        .sidebar-item {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
            cursor: pointer;
            color: white;
            text-align: right;
        }

        .sidebar-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(249, 115, 22, 0.3);
        }

        .sidebar-item .icon-box {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .sidebar-item .icon-box.orange { background: rgba(249, 115, 22, 0.15); color: #f97316; }
        .sidebar-item .icon-box.red { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .sidebar-item .icon-box.blue { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .sidebar-item .icon-box.green { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .sidebar-item .icon-box.purple { background: rgba(168, 85, 247, 0.15); color: #a855f7; }

        .sidebar-item .arrow {
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            transition: all 0.3s;
            margin-right: auto;
        }

        .sidebar-item:hover .arrow {
            color: #f97316;
            transform: translateX(-4px);
        }

        /* ===== أنماط مشغل الفيديو ===== */
        .video-controls {
            margin-top: 12px;
            padding: 10px 12px 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .progress-bar-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .time-display {
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            min-width: 50px;
            font-variant-numeric: tabular-nums;
        }
        .progress-track {
            flex: 1;
            height: 10px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: height 0.2s;
        }
        .progress-track:hover {
            height: 14px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #f97316, #3b82f6);
            border-radius: 10px;
            transition: width 0.05s linear;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            right: -8px;
            top: -6px;
            width: 22px;
            height: 22px;
            background: #f97316;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 0 20px rgba(249,115,22,0.6);
        }
        .progress-track:hover .progress-fill::after {
            opacity: 1;
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 4px 8px;
        }
        .controls-row button {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-weight: 500;
            min-width: 34px;
            justify-content: center;
            background: rgba(255,255,255,0.04);
            border: 1px solid transparent;
        }
        .controls-row button:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.1);
            color: #f97316;
        }
        .controls-row button:active { transform: scale(0.94); }
        .controls-row .active-btn {
            background: #f97316;
            color: #000;
            border-color: #f97316;
        }
        .controls-row .active-btn:hover {
            background: #ea580c;
            color: #000;
        }

        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .volume-slider {
            width: 44px;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            outline: none;
            transition: 0.2s;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #f97316;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(249,115,22,0.3);
        }
        .volume-slider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #f97316;
            cursor: pointer;
            border: none;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            color: #fff;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid #f97316;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(-20px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            pointer-events: none;
            white-space: nowrap;
            direction: ltr;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
            border-radius: 12px;
        }
        .loading-overlay.active {
            opacity: 1;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #f97316;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .video-wrapper-inner {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
            transform-origin: center center;
        }
        .video-wrapper-inner iframe {
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .controls-row { gap: 2px 6px; }
            .controls-row button { font-size: 0.75rem; padding: 3px 6px; min-width: 28px; }
            .volume-slider { width: 32px; }
            .time-display { font-size: 0.7rem; min-width: 40px; }
            .progress-track { height: 8px; }
            .progress-track:hover { height: 12px; }
            .progress-fill::after { width: 18px; height: 18px; right: -6px; top: -5px; }
        }
    </style>

                clearInterval(interval);
            }
        }, speed);
        return interval;

    // دالة إضافة رسالة

        const msgDiv = document.createElement('div');
        msgDiv.className = `ai-chat-message ${sender}`;
        msgDiv.style.flexShrink = '0'; // منع الضغط
        container.appendChild(msgDiv);
        if (sender === 'user') {
            msgDiv.innerHTML = `<span>${text}</span>`;
        } else {
            typeMessage(msgDiv, text);
        }
        container.scrollTop = container.scrollHeight;
    }

    // ===== تعريف الدوال في النطاق العام =====

            }, 300);
        }

            window.toggleSidebar = function () {
    const overlay = document.getElementById('sidebarOverlay');
    const menu = document.getElementById('sidebarMenu');

    if (!overlay || !menu) return;

    const isClosed =
        overlay.classList.contains('opacity-0') ||
        overlay.style.display === 'none';

    if (isClosed) {

        // فتح القائمة
        overlay.style.display = 'block';

        overlay.classList.remove(
            'opacity-0',
            'pointer-events-none'
        );

        overlay.classList.add('opacity-100');

        menu.classList.remove('translate-x-full');

        document.body.style.overflow = 'hidden';

    } else {

        // غلق القائمة
        overlay.classList.remove('opacity-100');

        overlay.classList.add(
            'opacity-0',
            'pointer-events-none'
        );

        menu.classList.add('translate-x-full');

        document.body.style.overflow = '';

        // إخفاء الخلفية نهائياً بعد انتهاء الأنيميشن
        setTimeout(() => {
            if (overlay.classList.contains('opacity-0')) {
                overlay.style.display = 'none';
            }
        }, 500);
    }
};

                    allQuestions = englishQuestions;

                    allQuestions = frenchQuestions;
                } else if (state.selectedLanguage === 'computer') {
                    allQuestions = computerQuestions;
                } else {
                    allQuestions = questionsDB[requestedType] || [];
                }

                let filteredQuestions = [];
                if (requestedType === 'صح وغلط') {
                    filteredQuestions = allQuestions.filter(q => q.options && q.options.length === 2);
                } else {
                    filteredQuestions = allQuestions.filter(q => q.options && q.options.length > 2);
                }

                    alert('عذراً، لا توجد أسئلة متوفرة لهذا النوع في هذا القسم حالياً.');
                    return;

                const selected = shuffleAndPick(filteredQuestions);

            function observeCards() {
                const cards = document.querySelectorAll('[data-card]');
                if (!cards.length) return;

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.remove('card-hidden');
                            entry.target.classList.add('card-visible');
                        } else {
                            entry.target.classList.remove('card-visible');
                            entry.target.classList.add('card-hidden');
                        }
                    });
                }, {
                    threshold: 0.1,
                    rootMargin: '0px 0px -50px 0px'
                });

                cards.forEach(card => observer.observe(card));
            }

            // ============================================================
            // 10. ربط الأحداث بعد التصيير
            // ============================================================

            function bindEvents() {
                // إعادة تطبيق مراقبة البطاقات بعد كل رندر
                setTimeout(observeCards, 100);
            }

                }

                state.isLoading = false;
                state.authChecked = true;
                render();
            }

            // بدء التطبيق
            init();

        })();

function startProgressUpdater(id) {
    if (progressIntervals[id]) clearInterval(progressIntervals[id]);
    progressIntervals[id] = setInterval(function() {
        var player = players[id];
        if (!player || !player.getCurrentTime) return;
        var current = player.getCurrentTime();
        var duration = player.getDuration();
        if (duration > 0) {
            var percent = (current / duration) * 100;
            var fill = document.getElementById('progressFill_' + id);
            var thumb = document.querySelector('#wrapper_' + id + ' .progress-thumb');
            var timeEl = document.getElementById('currentTime_' + id);
            
            // تحديث الجزء الملون
            if (fill) fill.style.width = Math.min(percent, 100) + '%';
            
            // تحديث موضع الدائرة باستخدام left
            if (thumb) {
                thumb.style.left = Math.min(percent, 100) + '%';
                thumb.style.transform = 'translate(-50%, -50%)';
            }
            
            // تحديث الوقت
            if (timeEl) timeEl.textContent = formatTime(current);
            
            playerStates[id].currentTime = current;
            playerStates[id].duration = duration;
        }

}

            if (!seconds || isNaN(seconds)) return '00:00';
            var mins = Math.floor(seconds / 60);
            var secs = Math.floor(seconds % 60);
            return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');

                    pointer-events: none;
                    opacity: 0;
                    transition: opacity 0.15s;
                `;
                progressTrack.style.position = 'relative';
                progressTrack.style.direction = 'ltr'; // اتجاه LTR مثل YouTube
                progressTrack.style.overflow = 'visible';
                progressTrack.appendChild(thumb);

                // إظهار الدائرة عند التمرير على الشريط
                progressTrack.addEventListener('mouseenter', function() {
                    thumb.style.opacity = '1';
                });
                progressTrack.addEventListener('mouseleave', function() {
                    if (!isDragging) thumb.style.opacity = '0';
                });

                var isDragging = false;
                var isHovering = false;

                function getSeekPercent(e) {
                    var rect = progressTrack.getBoundingClientRect();
                    var x = (e.clientX - rect.left) / rect.width;
                    return Math.min(Math.max(x, 0), 1);
                }

                function getSeekPercentTouch(e) {
                    var touch = e.touches[0];
                    var rect = progressTrack.getBoundingClientRect();
                    var x = (touch.clientX - rect.left) / rect.width;
                    return Math.min(Math.max(x, 0), 1);
                }

                function updateSeek(percent) {
                    var player = players[id];
                    if (!player) return;
                    var duration = player.getDuration();
                    if (!duration) return;
                    var seekTime = percent * duration;
                    
                    // تحديث الجزء الملون
                    progressFill.style.width = (percent * 100) + '%';
                    
                    // تحديث موضع الدائرة باستخدام left
                    thumb.style.left = (percent * 100) + '%';
                    thumb.style.transform = 'translate(-50%, -50%)';
                    
                    // تحديث الوقت المعروض
                    if (currentTimeEl) {
                        currentTimeEl.textContent = formatTime(seekTime);
                    }
                }

                function applySeek(percent) {
                    var player = players[id];
                    if (!player) return;
                    var duration = player.getDuration();
                    if (!duration) return;
                    var seekTime = percent * duration;
                    player.seekTo(seekTime, true);
                }

                // ----- Mouse Events -----
                progressTrack.addEventListener('mousedown', function(e) {
                    isDragging = true;
                    thumb.style.opacity = '1';
                    progressTrack.style.cursor = 'grabbing';
                    
                    var percent = getSeekPercent(e);
                    updateSeek(percent);
                    applySeek(percent);
                    
                    // إيقاف التحديث التلقائي
                    if (progressIntervals[id]) {
                        clearInterval(progressIntervals[id]);
                        progressIntervals[id] = null;
                    }
                    
                    e.preventDefault();
                });

                document.addEventListener('mousemove', function(e) {
                    if (!isDragging) return;
                    var percent = getSeekPercent(e);
                    updateSeek(percent);
                    applySeek(percent); // تحديث الفيديو أثناء السحب
                });

                document.addEventListener('mouseup', function(e) {
                    if (!isDragging) return;
                    isDragging = false;
                    progressTrack.style.cursor = 'pointer';
                    
                    var percent = getSeekPercent(e);
                    applySeek(percent);
                    
                    // إعادة تشغيل التحديث التلقائي
                    if (!progressIntervals[id]) {
                        startProgressUpdater(id);
                    }
                    
                    // إخفاء الدائرة إذا لم يكن الماوس فوق الشريط
                    if (!isHovering) {
                        thumb.style.opacity = '0';
                    }
                });

                // ----- Touch Events (للهواتف) -----
                progressTrack.addEventListener('touchstart', function(e) {
                    isDragging = true;
                    thumb.style.opacity = '1';
                    
                    var percent = getSeekPercentTouch(e);
                    updateSeek(percent);
                    applySeek(percent);
                    
                    if (progressIntervals[id]) {
                        clearInterval(progressIntervals[id]);
                        progressIntervals[id] = null;
                    }
                    
                    e.preventDefault();
                }, { passive: false });

                document.addEventListener('touchmove', function(e) {
                    if (!isDragging) return;
                    var percent = getSeekPercentTouch(e);
                    updateSeek(percent);
                    applySeek(percent); // تحديث الفيديو أثناء السحب
                    e.preventDefault();
                }, { passive: false });

                document.addEventListener('touchend', function(e) {
                    if (!isDragging) return;
                    isDragging = false;
                    
                    var percent = getSeekPercentTouch(e);
                    applySeek(percent);
                    
                    if (!progressIntervals[id]) {
                        startProgressUpdater(id);
                    }
                    
                    thumb.style.opacity = '0';
                });

                // ----- Click (للنقر العادي) -----
                progressTrack.addEventListener('click', function(e) {
                    if (isDragging) return;
                    var percent = getSeekPercent(e);
                    updateSeek(percent);
                    applySeek(percent);
                });

                // تتبع hover للدائرة
                progressTrack.addEventListener('mouseenter', function() {
                    isHovering = true;
                    thumb.style.opacity = '1';
                });
                progressTrack.addEventListener('mouseleave', function() {
                    isHovering = false;
                    if (!isDragging) {
                        thumb.style.opacity = '0';
                    }
                });

                console.log('✅ شريط التقدم مثل YouTube للمشغل ' + id);
            }
        })(i);
    }
}

        // ============================================================
        // 4. الإشعارات (Toast) - تم إزالة معظمها
        // ============================================================
        function showToast(message, duration) {
    duration = duration || 1400;
    var container = document.getElementById('toastContainer');
    if (!container) {
        var div = document.createElement('div');
        div.id = 'toastContainer';
        div.className = 'toast-container';
        div.style.bottom = '20px';
        div.style.top = 'auto';
        div.style.left = '50%';
        div.style.transform = 'translateX(-50%)';
        div.style.position = 'fixed';
        div.style.zIndex = '9999';
        div.style.display = 'flex';
        div.style.flexDirection = 'column';
        div.style.alignItems = 'center';
        div.style.gap = '8px';
        div.style.pointerEvents = 'none';
        document.body.appendChild(div);
        container = div;
    }
    var toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    toast.style.background = '#22c55e';
    toast.style.color = '#ffffff';
    toast.style.border = '1px solid #16a34a';
    toast.style.boxShadow = '0 8px 30px rgba(34,197,94,0.4)';
    toast.style.borderRadius = '40px';
    toast.style.padding = '10px 24px';
    toast.style.fontSize = '0.95rem';
    toast.style.fontWeight = '500';
    toast.style.opacity = '0';
    toast.style.transform = 'translateY(20px) scale(0.95)';
    toast.style.transition = 'all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
    toast.style.pointerEvents = 'none';
    toast.style.whiteSpace = 'nowrap';
    toast.style.direction = 'ltr';
    container.appendChild(toast);
    requestAnimationFrame(function() {
        toast.style.opacity = '1';
        toast.style.transform = 'translateY(0) scale(1)';
    });
    setTimeout(function() {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(20px) scale(0.95)';
        setTimeout(function() { toast.remove(); }, 400);
    }, duration);
}
// ===== دالة عرض Toast مخصص في منتصف الشاشة =====
function showCenteredBigToast(message, duration = 2000) {

        // ============================================================
        // 5. اختصارات لوحة المفاتيح (تؤثر على المشغل الأول)
        // ============================================================
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            var id = 1; // نطبق على المشغل الأول (الأساسي)
            switch (e.key) {
                case ' ':
                case 'Space':
                    e.preventDefault();
                    togglePlay(id);
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    seek(id, 5);
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    seek(id, -5);
                    break;
                case 'f':
                case 'F':
                    e.preventDefault();
                    toggleFullscreen(id);
                    break;
                case 'm':
                case 'M':
                    e.preventDefault();
                    toggleMute(id);
                    break;
                case 'r':
                case 'R':
                    e.preventDefault();
                    resetZoom(id);
                    break;
            }
        });

        // ============================================================
        // 6. كود تفعيل PWA (beforeinstallprompt و installPWA)
        // ============================================================
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log('✅ PWA installation prompt available');
        });

        window.installPWA = function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('✅ User accepted the PWA install');
                        showToast('✅ تم تثبيت التطبيق بنجاح!');
                    } else {
                        console.log('❌ User dismissed the PWA install');
                        showToast('❌ تم إلغاء التثبيت');
                    }
                    deferredPrompt = null;
                });
            } else {
                showToast('📱 استخدم قائمة المتصفح لتثبيت التطبيق (انظر التعليمات أدناه)', 4000);
            }
        };

        // ربط زر التثبيت
        document.addEventListener('click', function(e) {
            if (e.target && e.target.id === 'installPwaBtn') {
                window.installPWA();
            }
        });

        // تسجيل الـ Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('✅ Service Worker registered'))
                .catch(err => console.error('❌ Service Worker registration failed:', err));
        }

        // ============================================================
        // 7. إصلاح مشكلة لوحة المفاتيح في شات الذكاء الاصطناعي
        // ============================================================
        function fixAIChatKeyboard() {
    const container = document.getElementById('aiChatContainer');
    if (!container) return;

    // ضبط الارتفاع تلقائياً
    function setHeight() {
        if (window.visualViewport) {
            container.style.height = (window.visualViewport.height) + 'px';
        } else {
            container.style.height = window.innerHeight + 'px';
        }
    }

    setHeight();

    // الاستماع لتغيرات لوحة المفاتيح
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', function() {
            setHeight();
            // تمرير إلى أسفل الرسائل عند ظهور لوحة المفاتيح
            const messages = document.getElementById('aiChatMessages');
            if (messages) {
                setTimeout(() => {
                    messages.scrollTop = messages.scrollHeight;
                }, 100);
            }
        });
    }

    // عند النقر على حقل الإدخال
    const input = document.getElementById('aiChatInput');
    if (input) {
        input.addEventListener('focus', function() {
            setTimeout(() => {
                const messages = document.getElementById('aiChatMessages');
                if (messages) {
                    messages.scrollTop = messages.scrollHeight;
                }
                // تأكد من ظهور حقل الإدخال
                input.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        });
    }
    
    // عند فقدان التركيز (إغلاق لوحة المفاتيح)
    if (input) {
        input.addEventListener('blur', function() {
            setTimeout(setHeight, 300);
        });
    }
}
